    "minecraft:coal": 5
    "minecraft:copper_ingot": 5
    "minecraft:bone": 5.5
    "minecraft:gunpowder": 7.5
    "minecraft:amethyst_shard": 8
    "minecraft:quartz": 10
    "minecraft:iron_ingot": 10
