# WindyAgent 配置文件
# 修改后重启服务器生效

# 语言 / Language: zh_cn (中文) | en (English)
language: zh_cn

# 用量追踪：统计 LLM token 消耗 /api/usage
usage:
  enabled: true

# 人格文件：自定义 Agent 语气/风格（放在数据目录下 personality.md）
# personality: personality.md

# 上下文压缩：历史消息超阈值时用 LLM 摘要旧消息
context:
  compress:
    enabled: true
    threshold: 16      # 超过多少条消息触发压缩
    keep-recent: 6     # 保留最近多少条原样消息

# 用户画像：跨会话理解用户偏好（存 profiles/<session>.json）
profiles:
  enabled: true

# 速率限制：每玩家令牌桶防滥用
rate-limit:
  enabled: true
  bucket-size: 5     # 桶容量（最大突发请求数）
  refill-rate: 0.1   # 每秒补充令牌（0.1 = 每10秒恢复1个）

llm:
  # 供应商: claude | openai | ollama
  #   claude  — 使用 Anthropic 官方 SDK（或兼容代理）
  #   openai  — 任意 OpenAI 兼容协议（mimo、讯飞、智谱等）
  #   ollama  — 本地 Ollama
  provider: openai

  # API Key（claude 和 openai 时必填）
  # 注意：此为随 jar 分发的默认模板，切勿写入真实密钥；
  # 真实密钥只填在各自数据目录下生成的 windyagent-config.yml（不入库、不分发）。
  api-key: ""

  # API 接入地址
  #   openai  示例: https://token-plan-cn.xiaomimimo.com/v1
  #   claude  留空则使用 Anthropic 官方接口；填写则走对应代理
  api-base-url: "https://token-plan-cn.xiaomimimo.com/v1"

  # 模型名称
  #   openai  示例: mimo-v2.5-pro
  #   claude  示例: claude-opus-4-8
  #   ollama  示例: llama3.2
  model: "mimo-v2.5-pro"

  # Ollama 服务地址（仅 provider: ollama 时生效）
  ollama-url: "http://localhost:11434"

  # 便宜模型（可选）：路由分类/查询扩展等元任务用它省 token；留空=与主模型相同
  fast-model: ""

  # 故障转移（可选）：主 Provider 挂了（额度用完/过载/超时）自动切备用，对话不中断。
  # 主 Provider 恢复后自动切回（每 5 分钟健康检查）。
  # fallback:
  #   enabled: true
  #   providers:
  #     - provider: openai
  #       api-base-url: "https://xxx/v1"
  #       api-key: "备用-key"          # 留空则复用主 api-key
  #       model: "备用模型"
  #     - provider: ollama
  #       model: "llama3.2"            # 本地兜底，永远不欠费

agent:
  # 触发前缀
  trigger: "!ai"

  # 单次会话最大历史消息数
  max-history: 20

# 长期记忆（跨会话，默认开）：Agent 用 remember 记下玩家稳定偏好/服务器约定，
#   每次提问自动召回相关记忆拼进上下文。存 <数据目录>/memory/memories.json，重启不丢。
#   recall-top-k：每次召回条数；max-entries：上限，超出按最旧淘汰。关掉则无长期记忆。
memory:
  enabled: true
  recall-top-k: 3
  max-entries: 500
  recall-min-score: 2     # 召回最低相关度，低于此的弱命中不召回（挡垃圾进上下文、省 token）

# 模组物品估值（解析 mods/ 的静态数据建 SQLite 物品库，沿合成树递归算成本）。
#   base-values：基础材料在本服货币下的基准价（判断项，按你服经济调）；
#   default-base-value：未配基材的默认价；pack-discount：礼包按估值合计打的折。
item-valuation:
  enabled: true
  currency-name: "金币"
  default-base-value: 1
  pack-discount: 0.8
  # EMC 式传播：每步合成的加工开销（防 0 成本套利、体现工序价值）
  craft-overhead: 0.1
  # 全图传播最大迭代轮数（收敛即提前停；数千物品一般个位数轮收敛）
  propagation-max-iter: 50
  # value llm all：一次最多估多少个悬空物（封顶防 token 失控）
  llm-max-items: 600
  # value llm all：分批，每批多少个（一次 LLM 请求的条数；越大越省请求数、单次 token 越多）
  llm-batch-size: 80
  # value llm：LLM 把"无配方根"按稀有度归档（它只分类，不报精确数），档→金币值在此定，精确价靠传播派生
  rarity-tiers:
    common: 4
    uncommon: 16
    rare: 64
    epic: 256
    legendary: 1024
  # 种子值（人工锚定 value set 优先级更高 > 这里 > LLM 估值）。
  # 原版比例抄 item-alchemy(ProjectE 式 EMC 模组,社区标定的稀有度比例)，锚定 铁锭=10 缩放到金币。
  base-values:
    "minecraft:dirt": 0.1
    "minecraft:cobblestone": 0.1
    "minecraft:stone": 0.1
    "minecraft:sand": 0.1
    "minecraft:stick": 0.2
    "minecraft:string": 0.5
    "minecraft:slime_ball": 1
    "minecraft:charcoal": 1
    "minecraft:redstone": 2.5
    "minecraft:obsidian": 2.5
    "minecraft:leather": 2.5
    "minecraft:prismarine_shard": 4
    "minecraft:coal": 5
    "minecraft:copper_ingot": 5
    "minecraft:bone": 5.5
    "minecraft:gunpowder": 7.5
    "minecraft:amethyst_shard": 8
    "minecraft:quartz": 10
    "minecraft:iron_ingot": 10
    "minecraft:glowstone_dust": 15
    "minecraft:lapis_lazuli": 34
    "minecraft:emerald": 40
    "minecraft:ender_pearl": 40
    "minecraft:blaze_rod": 60
    "minecraft:gold_ingot": 80
    "minecraft:diamond": 320
    "minecraft:netherite_ingot": 2240
    "minecraft:nether_star": 5440
    # 对应 common 标签（与上面同值，桥接现代配方 #c:... 材料）
    "#c:ingots/iron": 10
    "#c:ingots/copper": 5
    "#c:ingots/gold": 80
    "#c:ingots/netherite": 2240
    "#c:gems/diamond": 320
    "#c:gems/emerald": 40
    "#c:gems/quartz": 10
    "#c:gems/lapis": 34
    "#c:gems/prismarine": 4
    "#c:gems/amethyst": 8
    "#c:dusts/redstone": 2.5
    "#c:dusts/glowstone": 15
    "#c:nuggets/iron": 1.1
    "#c:nuggets/gold": 9
    "#c:glass_blocks/colorless": 1
    "#c:rods/blaze": 60
    "#c:ender_pearls": 40
    "#c:strings": 0.5
    "#c:leathers": 2.5
    "#c:gunpowders": 7.5
    "#c:obsidians": 2.5
    "#c:cobblestones": 0.1
    "#c:stones": 0.1
    # 模组经济"原料根"（挖矿/掉落、无配方）：按你装的模组改。例(神秘农业)：
    # "mysticalagriculture:inferium_essence": 2
    # "mysticalagriculture:prosperity_shard": 4

# 玩家行为分析：子服采集（防卡：监听器只计数、后台单线程批量落库），汇总经总线给 VC 看板。
behavior:
  enabled: true
  flush-interval-sec: 60   # 多久把内存计数批量写库一次
  retention-days: 30       # 原始事件(死亡/成就)保留天数；画像长存
  churn-days: 7            # 超过这么多天未上线 = 流失风险
  active-minutes: 300      # 累计在线 ≥ 这么多分钟 = 核心玩家
  newbie-days: 3           # 首次上线在这么多天内 = 新玩家
  # 聊天词云：混合端(Youer/Mohist)的 AsyncPlayerChatEvent 在主线程触发会刷错，保持 false；仅 Paper 系子服可设 true。
  # 命令词云不受此开关影响，始终采集。
  track-chat: false

# 安全护栏：拦住 AI 自动执行破坏性命令（幻觉/误解/玩家提示注入都可能触发）。
#   mode: enforce 命中即拒 | warn 放行但记审计告警 | off 不拦
#   command-denylist 留空则用内置默认表（stop/op/ban/kill/reload 等）；可按需增删。
#   含 @a/@e/@r 群体选择器的命令无论是否在表内都判高危。每条执行(含被拒)记入数据目录 audit.log。
safety:
  mode: enforce
  command-denylist: []

# AI 管理控制台（WebUI，仅 Velocity 读取）：浏览器看玩家行为看板（以后加 AI 对话 + 知识库编辑）。
web:
  enabled: true          # 默认开启；浏览器开 http://<host>:<port>/。设 false 关闭
  host: "127.0.0.1"      # 默认只绑本机；要外网访问改 0.0.0.0 并务必设强 token
  port: 8080
  token: ""              # 留空=首启自动生成随机串写回本行；外网开放时务必用强 token

# 部署形态 —— 仅 Bukkit 插件读取；Velocity 固定为「中心 Agent」，忽略本段。
deployment:
  # auto       自动判定（默认，推荐）：socket 探测到中枢（如装了 WindyAgent 的 Velocity）=当 provider；
  #            探测不到=当 standalone 单机跑。仅 transport: socket 时探测，redis 下 auto 直接当 provider。
  # provider   纯能力提供方：连总线、执行中心下发的动作，本机不跑 Agent。
  # standalone 嵌入式 Agent：本机直接跑 Agent，无需代理/总线（单台 Paper 服）。
  # hub        嵌入式 Agent + 总线中枢：服务本服并派发到其它子服（无 Velocity 的多服群组）。auto 不会选 hub，需显式指定。
  mode: auto
  # 本节点在总线上注册的名字（provider 用；留空则 auto/provider 自动命名为 server-<端口> 并写回本行）。
  server-name: ""

# 跨服总线：中心 ↔ 子服通信。
#   Velocity：由下方 enabled 开关决定是否当中枢。
#   Bukkit：由上方 deployment.mode 决定角色（provider 连入 / hub 当中枢 / standalone 不用）。
# 寻址完全基于子服自报的 server-name，不依赖 Velocity 的玩家信道或服务器注册表。
cross-server:
  enabled: false

  # 传输实现：
  #   socket     — 默认/即插即用：自建 TCP 中枢，本端当 broker、子服主动连入，无需任何外部服务
  #   redis      — 进阶：Redis pub/sub（复用 RedisBungee 的 Redis），适合多代理集群；需自备 Redis
  #   inprocess  — 测试：进程内回显 stub，无需 Redis、无需第二个服务端，
  #                仅用于在单个 Velocity 实例里验证中心侧链路（不跨进程）
  transport: socket

  # 子服无响应的超时时间（毫秒）
  timeout-ms: 5000

  # 仅 transport: redis 时生效
  redis:
    host: "127.0.0.1"
    port: 6379
    password: ""

  # 仅 transport: socket 时生效
  #   host 按本节点角色理解：中枢(Velocity / Bukkit hub) = 监听地址（跨机器用 0.0.0.0）；
  #                          提供方(Bukkit provider) = 要连接的中枢地址。
  #   secret 为共享密钥（两端须一致；留空表示不校验，仅建议内网使用）。
  socket:
    host: "127.0.0.1"
    port: 25599
    secret: ""

# RAG 查询扩展（无 embedding 的语义增强，默认开）：
#   稀疏检索命中不足时，用 chat 模型把中文意图扩成检索关键词（含中英/同义）再检索，
#   填补「中文 ↔ 英文/规范词」鸿沟。仅 miss 时触发，多数查询零额外 LLM、成本可控。
rag:
  query-expansion: true
  min-hits: 1             # 命中数低于此才触发扩展

# 语义检索（L3 RAG，可选）：把各子服命令目录嵌入向量，search_capabilities 走语义匹配
#   （中文「传送/经济」也能命中 /tp /money 等英文命令）。关闭则走关键词检索（L2）。
#   默认复用上面 llm 的 api-base-url / api-key，只需填 embedding 模型名。
embedding:
  enabled: false
  model: ""               # 例：你的 mimo embedding 模型名
  api-base-url: ""        # 留空=复用 llm.api-base-url
  api-key: ""             # 留空=复用 llm.api-key

# 技能（skill，可选，默认开）：服主在插件数据目录的 skills/ 下放技能，给 Agent 加新能力。
#   对齐 Anthropic Agent Skills，两类：
#   ① 纯文字技能 —— 一套操作流程，Agent 读懂后用「现有工具」执行（不写代码）。如审退款的标准步骤。
#   ② 脚本+文字技能 —— SKILL.md 说清「何时/怎么用」，再配 Groovy 脚本干现有工具做不到的事
#      （直接调装过来插件的 API）。脚本注入变量：server / plugins / actions / args / log，return 回报 Agent。
#   文件形态（三选一）：
#     skills/<名>/SKILL.md (+ 可选脚本，frontmatter 里 script: xxx.groovy 指明)   ← 推荐
#     skills/<名>.md       （纯文字，YAML frontmatter + 正文）
#     skills/<名>.groovy   （纯脚本，头部 // name / // description / // arg 声明）
#   SKILL.md 头部：name / description / script（省略=纯文字）/ args（- 名: 类型 说明）。
#   安全：能往 skills/ 放文件的就是服主 → 视为「已审过的确定性扩展」，不过命令护栏、无人值守也可调，
#   但每次执行记 audit。脚本在主线程跑、带 timeout-sec 看门狗。provider 技能随能力目录推回中心，
#   中心用 search_capabilities 查、run_skill_on_server 调；standalone/hub 本机技能直接成为本地工具。
#   WebUI「🧪 技能扩展」可直接增删改 + 测试运行（保存即热重载）。
skills:
  enabled: true
  dir: "skills"          # 相对插件数据目录
  timeout-sec: 5         # 单次技能主线程执行超时（秒），解除 Agent 等待；不强杀脚本

# MCP 工具接入（可选）：把外部 MCP server 暴露的工具喂给 Agent。
# 与跨服总线正交——总线调自家子服能力，MCP 接第三方/外部标准化工具。
# 每项一个 server；headers 可选（如鉴权头）。留空则不接入。
mcp:
  servers: []
  # 示例：
  # - name: economy
  #   url: "http://127.0.0.1:8080/mcp"
  #   headers:
  #     Authorization: "Bearer your-token"
