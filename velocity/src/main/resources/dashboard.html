<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WindyAgent 管理控制台</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  :root { --bg:#0f1419; --card:#1a212b; --line:#2a3441; --fg:#e6edf3; --mut:#8b98a5; --acc:#4d9fff; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:system-ui,"Microsoft YaHei",sans-serif; background:var(--bg); color:var(--fg); }
  header { padding:14px 20px; border-bottom:1px solid var(--line); display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
  header h1 { font-size:18px; margin:0 12px 0 0; }
  input,select,button { background:var(--card); color:var(--fg); border:1px solid var(--line); border-radius:6px; padding:7px 10px; font-size:14px; }
  button { cursor:pointer; } button:hover { border-color:var(--acc); }
  main { padding:20px; max-width:1100px; margin:0 auto; }
  .cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:12px; margin-bottom:22px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:14px; }
  .card .v { font-size:26px; font-weight:600; } .card .k { color:var(--mut); font-size:13px; margin-top:4px; }
  .charts { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:22px; }
  .panel { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:16px; }
  .panel h3 { margin:0 0 12px; font-size:15px; font-weight:600; }
  .muted { color:var(--mut); } .err { color:#ff6b6b; }
  table { width:100%; border-collapse:collapse; font-size:14px; } td { padding:6px 8px; border-bottom:1px solid var(--line); }
  td:first-child { color:var(--mut); width:40%; }
  @media(max-width:720px){ .charts{grid-template-columns:1fr;} }
</style>
</head>
<body>
<header>
  <h1>🌬️ WindyAgent 控制台</h1>
  <input id="token" placeholder="访问 token" style="width:180px">
  <select id="server"></select>
  <button onclick="loadAll()">刷新</button>
  <span id="status" class="muted"></span>
</header>
<main>
  <div class="cards" id="cards"></div>
  <div class="charts">
    <div class="panel"><h3>玩家分群</h3><canvas id="segChart" height="200"></canvas></div>
    <div class="panel"><h3>在线时长 Top5（分钟）</h3><canvas id="topChart" height="200"></canvas></div>
  </div>
  <div class="panel">
    <h3>玩家画像查询</h3>
    <input id="pname" placeholder="玩家名"><button onclick="searchPlayer()">查询</button>
    <div id="player" style="margin-top:12px"></div>
  </div>
</main>
<script>
const $ = id => document.getElementById(id);
let segChart, topChart;

// token 记忆
$('token').value = localStorage.getItem('wa_token') || '';
$('token').onchange = () => localStorage.setItem('wa_token', $('token').value.trim());

async function api(path) {
  const r = await fetch(path, { headers: { 'X-Token': $('token').value.trim() } });
  if (!r.ok) throw new Error((await r.json().catch(()=>({}))).error || ('HTTP ' + r.status));
  return r.json();
}
const setStatus = (t, err) => { const s=$('status'); s.textContent=t; s.className = err?'err':'muted'; };

async function loadServers() {
  try {
    const servers = await api('/api/servers');
    $('server').innerHTML = servers.map(s => `<option>${s}</option>`).join('') || '<option value="">（无已连子服）</option>';
  } catch (e) { setStatus('连接失败：' + e.message, true); }
}

async function loadAll() {
  const sv = $('server').value;
  if (!sv) { setStatus('没有可选子服', true); return; }
  setStatus('加载中…');
  try {
    const [stats, seg] = await Promise.all([api('/api/stats?server='+sv), api('/api/segments?server='+sv)]);
    renderCards(stats); renderSeg(seg); renderTop(stats.topPlaytime || []);
    setStatus('已更新 · ' + new Date().toLocaleTimeString());
  } catch (e) { setStatus('加载失败：' + e.message, true); }
}

function renderCards(s) {
  const items = [
    ['总玩家', s.totalPlayers], ['今日活跃', s.active1d], ['7日活跃', s.active7d], ['今日新增', s.newToday],
    ['人均时长(分)', s.avgPlaytimeMin], ['总死亡', s.totalDeaths], ['破坏方块', s.totalBlocksBroken],
    ['合成', s.totalCrafts], ['成就', s.totalAdvancements]
  ];
  $('cards').innerHTML = items.map(([k,v]) => `<div class="card"><div class="v">${v??0}</div><div class="k">${k}</div></div>`).join('');
}

function renderSeg(seg) {
  const labels = Object.keys(seg), data = Object.values(seg);
  if (segChart) segChart.destroy();
  segChart = new Chart($('segChart'), {
    type:'doughnut',
    data:{ labels, datasets:[{ data, backgroundColor:['#4d9fff','#3fb950','#d29922','#f85149'] }] },
    options:{ plugins:{ legend:{ labels:{ color:'#e6edf3' } } } }
  });
}

function renderTop(top) {
  if (topChart) topChart.destroy();
  topChart = new Chart($('topChart'), {
    type:'bar',
    data:{ labels: top.map(t=>t.name), datasets:[{ data: top.map(t=>t.playtimeMin), backgroundColor:'#4d9fff' }] },
    options:{ indexAxis:'y', plugins:{ legend:{ display:false } },
      scales:{ x:{ ticks:{ color:'#8b98a5' } }, y:{ ticks:{ color:'#e6edf3' } } } }
  });
}

async function searchPlayer() {
  const sv = $('server').value, name = $('pname').value.trim();
  if (!sv || !name) return;
  try {
    const p = await api('/api/player?server='+sv+'&name='+encodeURIComponent(name));
    if (p.error) { $('player').innerHTML = `<span class="err">${p.error}</span>`; return; }
    const rows = [
      ['玩家', p.name], ['在线时长(分)', p.playtimeMin], ['会话数', p.sessions], ['死亡', p.deaths],
      ['命令', p.commands], ['放置方块', p.blocksPlaced], ['破坏方块', p.blocksBroken], ['合成', p.crafts], ['成就', p.advancements],
      ['首次登录', new Date(p.firstSeen).toLocaleString()], ['最近在线', new Date(p.lastSeen).toLocaleString()]
    ];
    $('player').innerHTML = '<table>' + rows.map(([k,v])=>`<tr><td>${k}</td><td>${v??0}</td></tr>`).join('') + '</table>';
  } catch (e) { $('player').innerHTML = `<span class="err">${e.message}</span>`; }
}

loadServers().then(loadAll);
</script>
</body>
</html>
