name: WindyAgent
version: 1.0-SNAPSHOT
main: org.windy.windyagent.platform.bukkit.WindyAgentBukkitPlugin
description: WindyAgent —— 能力提供方 / 单机嵌入式 Agent / 总线中枢（按 config.yml 的 mode）
author: windy664
# api-version 1.13：在 1.13+ 以现代模式运行；1.12 及更早会忽略该字段，仍正常加载
api-version: "1.13"
# 软依赖：装了就接，没装也照常启动。PlaceholderAPI=玩家画像数据源(需先加载好占位符)；CMI=运维动作工具；Vault=经济。
softdepend: [PlaceholderAPI, CMI, Vault]
commands:
  ai:
    description: 向 WindyAgent 提问或下达指令（standalone / hub 模式）
    usage: /ai <消息>
  ai-approve:
    description: 批准并执行 WindyAgent 待审的高危操作
    usage: /ai-approve <审批单号>
    permission: windyagent.admin
  ai-deny:
    description: 驳回 WindyAgent 待审的高危操作
    usage: /ai-deny <审批单号>
    permission: windyagent.admin
  ai-pending:
    description: 列出 WindyAgent 待审批的高危操作
    usage: /ai-pending
    permission: windyagent.admin
permissions:
  windyagent.admin:
    description: 触发高危操作走审批 + 审批/驳回权限
    default: op
