# ============================================================
# 【落地用】Velocity 中心端配置  —— 拓扑：Velocity + Bukkit / socket / 无 Redis
# 复制到：<Velocity>/plugins/windyagent/windyagent-config.yml
# 唯一待填：llm.api-key（粘你的 mimo key）
# ============================================================

llm:
  provider: openai
  # ↓↓↓ 粘你的 mimo key（仅本机这份，不要写进 jar/不要入库）
  api-key: ""
  api-base-url: "https://token-plan-cn.xiaomimimo.com/v1"
  model: "mimo-v2.5-pro"
  ollama-url: "http://localhost:11434"

agent:
  trigger: "!ai"
  max-history: 20

# Velocity 固定为中心 Agent，忽略 deployment 段（留作 schema 一致）
deployment:
  mode: provider
  server-name: ""

# 中心当 socket 中枢：监听 25599，等 Bukkit 子服连入
cross-server:
  enabled: true
  transport: socket
  timeout-ms: 5000
  redis:
    host: "127.0.0.1"
    port: 6379
    password: ""
  socket:
    # 同机调试用 127.0.0.1 即可；跨机器时改 0.0.0.0 监听全部网卡
    host: "127.0.0.1"
    port: 25599
    # 留空=不校验（同机内网够用）；要鉴权则两端填同一串
    secret: ""

mcp:
  servers: []

# 物品估值：中心只在 value llm 时调 LLM 给子服悬空物估价，故这里只用到分批大小。
# （base-values / 上限等其余项在各子服自己的配置里，因为物品库在子服。）
item-valuation:
  # value llm all 分批：每批喂给 LLM 多少个物品
  llm-batch-size: 80
  # value llm：LLM 把"无配方根"按稀有度归档，档→金币值在这里定（精确价靠传播派生）。
  rarity-tiers:
    common: 4
    uncommon: 16
    rare: 64
    epic: 256
    legendary: 1024

# AI 管理控制台（WebUI）：浏览器看玩家行为看板（以后加 AI 对话 + 知识库编辑）。仅 Velocity 读。
web:
  enabled: false         # 设 true 开启；浏览器开 http://<host>:<port>/
  host: "127.0.0.1"      # 默认只绑本机；要外网访问改 0.0.0.0 并务必设强 token
  port: 8080
  token: ""              # ★设成随机串，/api 鉴权用（留空=无鉴权，仅限本机调试）
