# ============================================================
# 【落地用】Bukkit 子服配置 —— 复制到 <Bukkit子服>/plugins/WindyAgent/windyagent-config.yml
#
# 按 deployment.mode 选三种形态之一，各自要改的不同：
#   ┌ provider   纯能力提供方（有 Velocity 中心）：本机不跑 Agent，只连中枢执行下发的动作。
#   │            必改：deployment.server-name、socket.host(填 Velocity 地址)、socket.secret(与中心一致)。
#   │            llm.api-key 不用填（本机不调 LLM）。← 默认就是这个。
#   ├ standalone 单机嵌入式 Agent（无 Velocity）：本机自己跑 Agent，玩家直接 !ai。
#   │            必改：deployment.mode=standalone、**llm.api-key 必填**；cross-server.enabled=false。
#   └ hub        嵌入式 Agent + 总线中枢（无 Velocity 的多服群组）：本机跑 Agent 且当中枢派发到其它子服。
#                必改：mode=hub、**llm.api-key 必填**、socket.host=0.0.0.0(监听)、其它子服按 provider 连进来。
# ============================================================

llm:
  # provider 模式不调 LLM，key 留空即可；standalone / hub **必须填 key**。
  provider: openai
  api-key: ""
  api-base-url: "https://token-plan-cn.xiaomimimo.com/v1"
  model: "mimo-v2.5-pro"
  ollama-url: "http://localhost:11434"

agent:
  trigger: "!ai"          # standalone/hub：玩家/控制台用它触发 Agent
  max-history: 20

deployment:
  mode: provider          # provider | standalone | hub（见顶部说明）
  # 本子服在总线上的名字（provider/hub 必填；中心 !ai 指令用它指代本服，例：earth / survival / lobby）
  server-name: "earth"

cross-server:
  # provider/hub：true；standalone(无总线)：false
  enabled: true
  transport: socket       # socket(自建中枢,无需 Redis) | redis(生产) | inprocess(测试)
  timeout-ms: 5000
  redis:
    host: "127.0.0.1"
    port: 6379
    password: ""
  socket:
    # provider：填中枢(Velocity/hub)的地址，同机=127.0.0.1、跨机=中心 IP。
    # hub：本机当中枢，填 0.0.0.0（跨机监听）或 127.0.0.1（同机）。
    host: "127.0.0.1"
    port: 25599
    secret: ""            # 共享密钥，与中心两端一致；留空=不校验（仅内网）

# ↓↓↓ 以下 safety / memory 段：standalone / hub 模式（本机跑 Agent）才生效；provider 模式忽略。
# 安全护栏：拦 AI 自动执行破坏性命令（高危转人工审批）。
safety:
  mode: enforce           # enforce 命中即拒 | warn 放行记审计 | off 不拦
  command-denylist: []    # 留空用内置默认表（stop/op/ban/kill/reload 等）

# 长期记忆（跨会话）：standalone/hub 的 Agent 用；写在数据目录 memory/ 下。
memory:
  enabled: true
  recall-top-k: 3
  max-entries: 500

mcp:
  servers: []

# 模组物品估值（EMC 式：种子值 + 全图传播）。本服有 mods/，解析→SQLite→传播。
item-valuation:
  enabled: true
  currency-name: "金币"
  default-base-value: 1
  pack-discount: 0.8
  # 每步合成的加工开销（防 0 成本套利、体现工序价值）
  craft-overhead: 0.1
  # 全图传播最大迭代轮数（收敛即提前停）
  propagation-max-iter: 50
  # value llm all：一次最多估多少个悬空物（封顶防 token 失控）
  llm-max-items: 600
  # value llm all：分批，每批多少个（一次 LLM 请求的条数）
  llm-batch-size: 80
  # 种子值：估值的源头。人工 value set 优先级更高，盖过这里。
  # 没有种子 = 传播无源 = 全退默认值，务必保留这些基材锚点。
  base-values:
    # 原版比例抄 item-alchemy(ProjectE 式 EMC 模组,社区标定的稀有度比例)，锚定 铁锭=10 缩放到金币。
    "minecraft:dirt": 0.1
    "minecraft:cobblestone": 0.1
    "minecraft:stone": 0.1
    "minecraft:sand": 0.1
    "minecraft:stick": 0.2
    "minecraft:string": 0.5
    "minecraft:slime_ball": 1
    "minecraft:charcoal": 1
    "minecraft:redstone": 2.5
    "minecraft:obsidian": 2.5
    "minecraft:leather": 2.5
    "minecraft:prismarine_shard": 4
    "minecraft:coal": 5
    "minecraft:copper_ingot": 5
    "minecraft:bone": 5.5
    "minecraft:gunpowder": 7.5
    "minecraft:amethyst_shard": 8
    "minecraft:quartz": 10
    "minecraft:iron_ingot": 10
    "minecraft:glowstone_dust": 15
    "minecraft:lapis_lazuli": 34
    "minecraft:emerald": 40
    "minecraft:ender_pearl": 40
    "minecraft:blaze_rod": 60
    "minecraft:gold_ingot": 80
    "minecraft:diamond": 320
    "minecraft:netherite_ingot": 2240
    "minecraft:nether_star": 5440
    # 对应 common 标签（与上面同值，桥接现代配方 #c:... 材料）
    "#c:ingots/iron": 10
    "#c:ingots/copper": 5
    "#c:ingots/gold": 80
    "#c:ingots/netherite": 2240
    "#c:gems/diamond": 320
    "#c:gems/emerald": 40
    "#c:gems/quartz": 10
    "#c:gems/lapis": 34
    "#c:gems/prismarine": 4
    "#c:gems/amethyst": 8
    "#c:dusts/redstone": 2.5
    "#c:dusts/glowstone": 15
    "#c:nuggets/iron": 1.1
    "#c:nuggets/gold": 9
    "#c:glass_blocks/colorless": 1
    "#c:rods/blaze": 60
    "#c:ender_pearls": 40
    "#c:strings": 0.5
    "#c:leathers": 2.5
    "#c:gunpowders": 7.5
    "#c:obsidians": 2.5
    "#c:cobblestones": 0.1
    "#c:stones": 0.1
    # —— 模组经济的"原料根"（按你装的模组改）——
    # 种地掉落 / 挖矿得来、没有合成成本可追的源头物，必须在这里（或用 value set）锚定，
    # 否则依赖它们的物品会全部悬空退默认值。锚定后上层顺合成树级联解析。
    # 例（神秘农业）：整条精华链建立在这两个本位物上：
    #   "mysticalagriculture:inferium_essence": 2
    #   "mysticalagriculture:prosperity_shard": 4
    # 怎么找根：value build 后看回执"被大量配方依赖却无合成路径"清单，挑最底层的几个锚定。

# 玩家行为分析：本子服采集（防卡：监听器只计数、后台单线程批量落库），汇总经总线给 VC 看板。
behavior:
  enabled: true
  flush-interval-sec: 60   # 多久把内存计数批量写库一次
  retention-days: 30       # 原始事件(死亡/成就)保留天数；画像长存
  churn-days: 7            # 超过这么多天未上线 = 流失风险
  active-minutes: 300      # 累计在线 ≥ 这么多分钟 = 核心玩家
  newbie-days: 3           # 首次上线在这么多天内 = 新玩家
  # 聊天词云：用 AsyncPlayerChatEvent 采。Paper 系一直可开 true；
  # 混合端 Youer 自 26.1.2.76（聊天链改走 server.chatExecutor）起已修复，亦可设 true；旧混合端仍保持 false（异步在主线程触发会刷错）。
  # 命令词云不受此开关影响，始终采集。
  track-chat: false
